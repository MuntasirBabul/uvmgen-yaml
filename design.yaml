# ============================================================
# Project Information
# ============================================================

project:
  name: uart_tb
  dut_name: uart_top
  top_env: uart_env
  package_name: uart_pkg

# ============================================================
# Interfaces
# ============================================================

interfaces:
  - name: uart_if
    clock: clk
    reset: rst_n

    signals:
      - {name: tx, type: logic}
      - {name: rx, type: logic}
      - {name: baud_tick, type: logic}

# ============================================================
# Agents
# ============================================================

agents:

  - name: uart_tx_agent
    type: active              # active | passive
    interface: uart_if
    transaction:
      name: uart_txn
      fields:
        - {name: data, type: "bit [7:0]", rand: true}
        - {name: parity, type: bit, rand: true}
        - {name: stop_bits, type: int, rand: true}
      constraints:
        - "stop_bits inside {1,2};"
      methods:
        do_print: true
        do_copy: true
        do_compare: true
    sequencer:
      generate: true
    driver:
      generate: true
    monitor:
      generate: true
    coverage:
      enable: true
  
  - name: uart_rx_agent
    type: passive
    interface: uart_if
    transaction:
      name: uart_rxn
      fields:
        - {name: data, type: "bit [7:0]", rand: false}
        - {name: parity_error, type: bit, rand: false}
    sequencer:
      generate: false
    driver:
      generate: false
    monitor:
      generate: true
    coverage:
      enable: true

# ============================================================
# Sequences
# ============================================================

sequences:

  - name: uart_base_seq
    base_class: uvm_sequence

  - name: uart_smoke_seq
    base_class: uart_base_seq
    body:
      num_transactions: 10

  - name: uart_random_seq
    base_class: uart_base_seq
    body:
      num_transactions: 100

# ============================================================
# Scoreboard
# ============================================================

scoreboard:
  enable: true
  name: uart_scoreboard
  analysis_exports:
    - expected_export
    - actual_export

# ============================================================
# Coverage
# ============================================================

coverage:
  enable: true
  name: uart_coverage
  covergroups:
    - name: cg_data
      coverpoints:
        - field: data
          bins:
            - low
            - mid
            - high
    - name: cg_parity
      coverpoints:
        - field: parity

# ============================================================
# Environment
# ============================================================

environment:
  name: uart_env
  components:
    scoreboard: uart_scoreboard
    coverage: uart_coverage
  connections:
    - source: uart_tx_agent.monitor.ap
      destination: uart_scoreboard.expected_export
    - source: uart_rx_agent.monitor.ap
      destination: uart_scoreboard.actual_export

# ============================================================
# Configuration Objects
# ============================================================

config_objects:
  - name: uart_env_cfg
    fields:
      - {name: has_scoreboard, type: bit, default: 1}
      - {name: has_coverage, type: bit, default: 1}
  - name: uart_agent_cfg
    fields:
      - {name: is_active, type: uvm_active_passive_enum, default: UVM_ACTIVE}
      - {name: baud_rate, type: int, default: 115200}

# ============================================================
# Register Model (Optional)
# ============================================================

register_model:
  enable: true
  block_name: uart_reg_block
  registers:
    - name: CTRL
      address: 0x00
      fields:
        - {name: enable, lsb: 0, width: 1}
        - {name: parity_en, lsb: 1, width: 1}
    - name: STATUS
      address: 0x04
      fields:
        - {name: tx_busy, lsb: 0, width: 1}
        - {name: rx_ready, lsb: 1, width: 1}

# ============================================================
# Tests
# ============================================================

tests:
  - name: uart_base_test
    base_class: uvm_test
    default_sequence: uart_base_seq
  
  - name: uart_smoke_test
    base_class: uart_base_test
    default_sequence: uart_smoke_seq
  
  - name: uart_random_test
    base_class: uart_base_test
    default_sequence: uart_random_seq

# ============================================================
# Generation Options
# ============================================================

generation:
  create_pkg: true
  create_top_tb: true
  create_makefile: true
  create_filelist: true
  create_interface: true
  create_ral_model: true
  create_coverage: true
  create_scoreboard: true
  overwrite_existing_files: false

# ============================================================
# Output Structure
# ============================================================

output:
  root_dir: generated_tb
  folders:
    - agents
    - env
    - tests
    - sequences
    - interfaces
    - config
    - coverage
    - scoreboard
    - ral
    - pkg